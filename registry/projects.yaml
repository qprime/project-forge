# Project Registry — Single source of truth for project metadata (FG-1)
# Managed by project-forge. Do not duplicate this data elsewhere.
#
# Discovery contract (per issue #6):
#   - `path:` is mandatory for entries that have a manifest at <path>/.forge/manifest.yaml.
#   - Entries without a manifest carry `manifest: none` as a sentinel; discovery skips them.
#   - Entries are migrated off `manifest: none` as they are migrated to forge.

projects:
